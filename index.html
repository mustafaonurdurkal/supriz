<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Senin İçin ❤️</title>
<style>
body{
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    font-family: Arial;
    text-align:center;
    color:white;
    margin-top:100px;
}
.card{
    background:white;
    color:#333;
    padding:40px;
    border-radius:15px;
    width:400px;
    margin:auto;
}
button{
    background:#ff4d6d;
    border:none;
    padding:10px 20px;
    color:white;
    font-size:16px;
    border-radius:10px;
    cursor:pointer;
}
input{
    width:100%;
    padding:8px;
    margin-top:10px;
}
</style>
</head>
<body>

<h1>Sana Küçük Bir Sürprizim Var 🎁</h1>

<div class="card">
<p>Detay vermiyorum ama sana bir şey göndermek istiyorum 😌</p>
<p>Adresini yazarsan sürpriz yola çıkacak ❤️</p>

<form id="adresForm">
    <input type="text" name="adres" placeholder="Adresini buraya yaz" required>
    <br><br>
    <button type="submit">Adresimi Yazıyorum ❤️</button>
</form>

<p id="mesaj"></p>
</div>

<script>
document.getElementById("adresForm").addEventListener("submit", function(e){
    e.preventDefault(); // sayfa yenilenmesin

    let formData = new FormData(this);

    fetch("https://formspree.io/f/mykngeop", {
        method: "POST",
        body: formData,
        headers: {
            'Accept': 'application/json'
        }
    }).then(response => {
        if(response.ok){
            document.getElementById("mesaj").innerHTML =
            "Tamam ❤️ Sürpriz hazırlanıyor...";
            this.reset();
        } else {
            document.getElementById("mesaj").innerHTML =
            "Bir hata oluştu 😢";
        }
    });
});
</script>

</body>
</html>
