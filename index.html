<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senin İçin ❤️</title>

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

/* Kart */
.card{
    background:white;
    padding:40px 25px;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    max-width:400px;
    width:90%;
    position:relative;
    z-index:2;
    animation:fadeIn 1s ease-in-out;
}

h1{
    color:white;
    position:absolute;
    top:30px;
    width:100%;
    font-size:22px;
}

/* Input */
input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:12px;
    border:1px solid #ddd;
    font-size:14px;
}

/* Button */
button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    background:#ff1e4d;
}

#mesaj{
    margin-top:15px;
    font-weight:bold;
    color:#ff4d6d;
}

/* Kalp animasyonu */
.heart{
    position:absolute;
    color:#ff4d6d;
    font-size:20px;
    animation:floatUp 5s linear infinite;
}

@keyframes floatUp{
    0%{transform:translateY(0) scale(1); opacity:1;}
    100%{transform:translateY(-800px) scale(1.5); opacity:0;}
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<h1 id="baslik">Sana Küçük Bir Sürprizim Var 🎁</h1>

<div class="card">
<p id="kisiMesaj">Detay vermiyorum ama sana bir şey göndermek istiyorum 😌</p>
<p>Adresini yazarsan sürpriz yola çıkacak ❤️</p>

<form id="adresForm">
    <input type="text" name="adres" placeholder="Adresini buraya yaz" required>
    <button type="submit">Adresimi Yazıyorum ❤️</button>
</form>

<p id="mesaj"></p>
</div>

<script>
/* Statik isim */
let isim = "Kübra";

document.getElementById("baslik").innerHTML = isim + " için küçük bir sürpriz 🎁";
document.getElementById("kisiMesaj").innerHTML = isim + ", sana bir şey göndermek istiyorum 😌";

/* Form gönderme */
document.getElementById("adresForm").addEventListener("submit", function(e){
    e.preventDefault();

    let formData = new FormData(this);

    fetch("https://formspree.io/f/mykngeop", {
        method: "POST",
        body: formData,
        headers: {'Accept':'application/json'}
    }).then(response => {
        if(response.ok){
            document.getElementById("mesaj").innerHTML =
            "Tamam ❤️ Sürpriz hazırlanıyor...";
            confettiEffect();
            this.reset();
        } else {
            document.getElementById("mesaj").innerHTML =
            "Bir hata oluştu 😢";
        }
    });
});

/* Kalp üretici */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random()*20+15)+"px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);

}, 500);

/* Konfeti efekti */
function confettiEffect(){
    for(let i=0;i<100;i++){
        let confetti = document.createElement("div");
        confetti.style.position="absolute";
        confetti.style.width="8px";
        confetti.style.height="8px";
        confetti.style.backgroundColor=
        "hsl(" + Math.random()*360 + ",100%,50%)";
        confetti.style.left=Math.random()*100+"vw";
        confetti.style.top="-10px";
        confetti.style.opacity="0.8";
        confetti.style.zIndex="3";
        confetti.style.transition="3s linear";
        document.body.appendChild(confetti);

        setTimeout(()=>{
            confetti.style.top="100vh";
            confetti.style.transform="rotate(720deg)";
        },10);

        setTimeout(()=>{
            confetti.remove();
        },3000);
    }
}
</script>

</body>
</html>
