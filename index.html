<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Senin İçin ❤️</title>
<style>

body{
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    font-family: 'Segoe UI', sans-serif;
    text-align:center;
    color:white;
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:white;
    color:#333;
    padding:50px;
    border-radius:20px;
    width:420px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    animation: fadeIn 1s ease-in-out;
}

h1{
    position:absolute;
    top:40px;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:14px;
}

button{
    margin-top:20px;
    background:#ff4d6d;
    border:none;
    padding:12px 25px;
    color:white;
    font-size:16px;
    border-radius:25px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff1e4d;
    transform:scale(1.05);
}

#mesaj{
    margin-top:15px;
    font-weight:bold;
    color:#ff4d6d;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

</style>
</head>
<body>

<h1>Sana Küçük Bir Sürprizim Var 🎁</h1>

<div class="card">
<p>Detay vermiyorum ama sana bir şey göndermek istiyorum 😌</p>
<p>Adresini yazarsan sürpriz yola çıkacak ❤️</p>

<form id="adresForm">
    <input type="text" name="adres" placeholder="Adresini buraya yaz" required>
    <button type="submit">Adresimi Yazıyorum ❤️</button>
</form>

<p id="mesaj"></p>
</div>

<script>
document.getElementById("adresForm").addEventListener("submit", function(e){
    e.preventDefault();
    let formData = new FormData(this);

    fetch("https://formspree.io/f/mykngeop", {
        method: "POST",
        body: formData,
        headers: { 'Accept': 'application/json' }
    }).then(response => {
        if(response.ok){
            document.getElementById("mesaj").innerHTML =
            "Tamam ❤️ Sürpriz hazırlanıyor...";
            this.reset();
        } else {
            document.getElementById("mesaj").innerHTML =
            "Bir hata oluştu 😢";
        }
    });
});
</script>

</body>
</html>
